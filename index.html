<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyStudio | Vector Editor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800&display=swap');

        :root {
            --bg: #050508;
            --panel: rgba(20, 22, 32, 0.85);
            --accent: #7000ff;
            --accent-light: #a35cff;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --danger: #ff3e3e;
            --success: #10b981;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(255,255,255,0.03) 1px, transparent 0);
            background-size: 32px 32px;
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* --- UI Panels --- */
        .glass {
            background: var(--panel);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        /* Floating Header */
        header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1000px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo .dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent);
        }

        /* Toolbar Left */
        .toolbar-left {
            position: absolute;
            left: 20px;
            top: 100px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px;
            z-index: 90;
        }

        /* Property Panel Right */
        .inspector {
            position: absolute;
            right: 20px;
            top: 100px;
            width: 240px;
            max-height: calc(100vh - 140px);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 90;
            overflow-y: auto;
        }

        /* --- Buttons & Inputs --- */
        .tool-btn {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .tool-btn:hover {
            color: var(--text);
            background: rgba(255,255,255,0.05);
        }

        .tool-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 20px rgba(112, 0, 255, 0.4);
        }

        .tool-btn::after {
            content: attr(data-tooltip);
            position: absolute;
            left: 60px;
            background: #1e293b;
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .tool-btn:hover::after { opacity: 1; }

        .action-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.05);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--text-dim); }
        .btn-primary { background: var(--accent); border: none; }
        .btn-primary:hover { background: var(--accent-light); }

        /* --- Canvas Area --- */
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: transparent;
        }

        canvas { cursor: crosshair; }

        /* --- Inspector List --- */
        .poly-card {
            padding: 12px;
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
            margin-bottom: 8px;
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .poly-card.active {
            border-color: var(--accent);
            background: rgba(112, 0, 255, 0.05);
        }

        .color-circle {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        /* --- Notifications --- */
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .toast {
            padding: 12px 24px;
            border-radius: 12px;
            background: #1e293b;
            color: white;
            font-size: 13px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-left: 4px solid var(--accent);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hint {
            position: absolute;
            bottom: 24px;
            left: 24px;
            color: var(--text-dim);
            font-size: 12px;
        }

        /* Hide default file input */
        #file-input { display: none; }
    </style>
</head>
<body>

    <header class="glass">
        <div class="logo"><div class="dot"></div> PolyStudio</div>
        <div style="display: flex; gap: 12px;">
            <button class="action-btn" onclick="saveData()">Export JSON</button>
            <button class="action-btn" onclick="document.getElementById('file-input').click()">Import</button>
            <button class="action-btn btn-primary" onclick="clearCanvas()">Clear Scene</button>
        </div>
    </header>

    <div class="toolbar-left glass">
        <button class="tool-btn active" id="mode-idle" onclick="setMode('idle')" data-tooltip="Selection (Esc)">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
        </button>
        <button class="tool-btn" id="mode-draw" onclick="setMode('draw')" data-tooltip="Draw Path (B)">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.5 1.5M2 2l1.5 7.5"/></svg>
        </button>
        <button class="tool-btn" id="mode-move" onclick="setMode('move')" data-tooltip="Modify Points (M)">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 3l3.057-1.794a1 1 0 011.05 0L19 7l1.794 3.057a1 1 0 010 1.05L14 19l-3.057 1.794a1 1 0 01-1.05 0L3 14l-1.794-3.057a1 1 0 010-1.05L5 3z"/></svg>
        </button>
        <button class="tool-btn" id="mode-insert" onclick="setMode('insert')" data-tooltip="Insert Node (I)">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
        </button>
        <button class="tool-btn" id="mode-delete" onclick="setMode('delete')" data-tooltip="Erase (D)">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </button>
    </div>

    <div class="inspector glass" id="inspector">
        <div style="font-weight: 600; font-size: 14px; margin-bottom: 16px; color: var(--text-dim);">LAYERS</div>
        <div id="poly-list"></div>
    </div>

    <div class="hint">
        [B] Draw &bull; [M] Move &bull; [D] Delete &bull; [Esc] Selection &bull; [Space] Finish Path
    </div>

    <div id="toast-container" class="toast-container"></div>
    <input type="file" id="file-input" accept=".json" onchange="handleImport(event)">

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <script>
        /**
         * Core State
         */
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const COLORS = ['#7000ff', '#10b981', '#f59e0b', '#3b82f6', '#ef4444', '#ec4899'];
        
        let paths = [];
        let currentMode = 'idle';
        let activeIdx = -1;
        let isDragging = false;
        let dragTarget = null;
        let mouse = { x: 0, y: 0 };

        /**
         * Initialization
         */
        function init() {
            window.addEventListener('resize', resize);
            resize();
            
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('mousedown', handleMouseDown);
            canvas.addEventListener('mouseup', () => { isDragging = false; dragTarget = null; });
            window.addEventListener('keydown', handleKeys);

            loop();
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        /**
         * Logic & Rendering
         */
        function loop() {
            render();
            requestAnimationFrame(loop);
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            paths.forEach((path, idx) => {
                const isActive = idx === activeIdx;
                const points = path.points;
                if (points.length === 0) return;

                // Draw Line
                ctx.beginPath();
                ctx.strokeStyle = path.color;
                ctx.lineWidth = isActive ? 3 : 2;
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                
                ctx.moveTo(points[0].x, points[0].y);
                for (let i = 1; i < points.length; i++) {
                    ctx.lineTo(points[i].x, points[i].y);
                }
                ctx.stroke();

                // Draw Preview Line (if drawing)
                if (isActive && currentMode === 'draw' && points.length > 0) {
                    ctx.beginPath();
                    ctx.setLineDash([5, 5]);
                    ctx.moveTo(points[points.length - 1].x, points[points.length - 1].y);
                    ctx.lineTo(mouse.x, mouse.y);
                    ctx.strokeStyle = path.color + '88';
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                // Draw Points
                points.forEach((p, pIdx) => {
                    const isHovered = getDist(p, mouse) < 10;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, isActive ? 5 : 3.5, 0, Math.PI * 2);
                    ctx.fillStyle = isHovered ? '#fff' : path.color;
                    ctx.shadowBlur = isHovered ? 15 : 0;
                    ctx.shadowColor = path.color;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });
            });
        }

        /**
         * Interaction Handlers
         */
        function handleMouseMove(e) {
            mouse.x = e.clientX;
            mouse.y = e.clientY;

            if (isDragging && dragTarget) {
                const p = paths[dragTarget.pathIdx].points[dragTarget.ptIdx];
                p.x = mouse.x;
                p.y = mouse.y;
            }
        }

        function handleMouseDown(e) {
            if (currentMode === 'draw') {
                if (activeIdx === -1) {
                    createNewPath();
                }
                paths[activeIdx].points.push({ x: mouse.x, y: mouse.y });
            } 
            else if (currentMode === 'move') {
                const target = findNearestPoint(mouse.x, mouse.y);
                if (target) {
                    dragTarget = target;
                    isDragging = true;
                    activeIdx = target.pathIdx;
                    updateInspector();
                }
            }
            else if (currentMode === 'delete') {
                const target = findNearestPoint(mouse.x, mouse.y);
                if (target) {
                    paths[target.pathIdx].points.splice(target.ptIdx, 1);
                    if (paths[target.pathIdx].points.length === 0) {
                        paths.splice(target.pathIdx, 1);
                        activeIdx = -1;
                    }
                    updateInspector();
                    showToast("Point removed", "danger");
                }
            }
            else if (currentMode === 'insert') {
                const seg = findNearestSegment(mouse.x, mouse.y);
                if (seg) {
                    paths[seg.pathIdx].points.splice(seg.segIdx + 1, 0, { x: mouse.x, y: mouse.y });
                    showToast("Node inserted");
                }
            }
            else if (currentMode === 'idle') {
                const target = findNearestPoint(mouse.x, mouse.y);
                if (target) {
                    activeIdx = target.pathIdx;
                    updateInspector();
                }
            }
        }

        function handleKeys(e) {
            const key = e.key.toLowerCase();
            if (key === 'b') setMode('draw');
            if (key === 'm') setMode('move');
            if (key === 'd') setMode('delete');
            if (key === 'i') setMode('insert');
            if (key === 'escape') setMode('idle');
            if (key === ' ' && currentMode === 'draw') {
                e.preventDefault();
                setMode('idle');
                showToast("Path finished");
            }
        }

        /**
         * State Management
         */
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`mode-${mode}`).classList.add('active');
            
            if (mode !== 'draw') {
                // Keep activeIdx for editing, but don't force a new path
            } else {
                createNewPath();
            }
        }

        function createNewPath() {
            const color = COLORS[paths.length % COLORS.length];
            paths.push({ points: [], color: color });
            activeIdx = paths.length - 1;
            updateInspector();
        }

        function updateInspector() {
            const container = document.getElementById('poly-list');
            container.innerHTML = '';
            paths.forEach((path, idx) => {
                const card = document.createElement('div');
                card.className = `poly-card ${idx === activeIdx ? 'active' : ''}`;
                card.innerHTML = `
                    <div class="color-circle" style="background:${path.color}"></div>
                    <div style="flex:1">Layer ${idx + 1}</div>
                    <div style="color:var(--text-dim); font-size:10px">${path.points.length} nodes</div>
                `;
                card.onclick = (e) => {
                    e.stopPropagation();
                    activeIdx = idx;
                    updateInspector();
                };
                container.appendChild(card);
            });
        }

        /**
         * Utilities
         */
        function getDist(p1, p2) {
            return Math.sqrt((p1.x - p2.x) ** 2 + (p1.y - p2.y) ** 2);
        }

        function findNearestPoint(x, y) {
            let threshold = 15;
            let result = null;
            paths.forEach((path, pathIdx) => {
                path.points.forEach((pt, ptIdx) => {
                    const d = getDist({x, y}, pt);
                    if (d < threshold) {
                        threshold = d;
                        result = { pathIdx, ptIdx };
                    }
                });
            });
            return result;
        }

        function findNearestSegment(x, y) {
            let threshold = 15;
            let result = null;
            paths.forEach((path, pathIdx) => {
                for (let i = 0; i < path.points.length - 1; i++) {
                    const a = path.points[i];
                    const b = path.points[i+1];
                    const d = distToSegment({x, y}, a, b);
                    if (d < threshold) {
                        threshold = d;
                        result = { pathIdx, segIdx: i };
                    }
                }
            });
            return result;
        }

        function distToSegment(p, v, w) {
            const l2 = (v.x - w.x)**2 + (v.y - w.y)**2;
            if (l2 == 0) return getDist(p, v);
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return getDist(p, { x: v.x + t * (w.x - v.x), y: v.y + t * (w.y - v.y) });
        }

        function showToast(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (type === 'danger') toast.style.borderColor = 'var(--danger)';
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function clearCanvas() {
            if (confirm("Reset the entire scene?")) {
                paths = [];
                activeIdx = -1;
                updateInspector();
                showToast("Canvas cleared", "danger");
            }
        }

        function saveData() {
            const data = JSON.stringify(paths);
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'sketch.json';
            a.click();
            showToast("Project exported");
        }

        function handleImport(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    paths = JSON.parse(event.target.result);
                    activeIdx = paths.length > 0 ? 0 : -1;
                    updateInspector();
                    showToast("Project loaded");
                } catch(e) {
                    showToast("Error loading file", "danger");
                }
            };
            reader.readAsText(file);
        }

        init();
    </script>
</body>
</html>
